<!DOCTYPE html>
<html>
<head>
    <title>1 Crore in 365 Days</title>
</head>
<body>
    <iframe id="myIframe" src="https://script.google.com/macros/s/AKfycbyDvseusBBpb3KmdiRSB09CyD6xFQ5nIvbGe2WhFVBcnfQYOV-UinxHf0LwortKGXpxbA/exec"
    width="100%" height="100%" allowfullscreen="true" allow="fullscreen"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;"></iframe>

    <button onclick="goFullScreen()" style="position: absolute; z-index: 999; top: 10px; left: 10px;">
        Click to Fullscreen
    </button>

    <script>
        function goFullScreen() {
            var iframe = document.getElementById('myIframe');
            
            // Fullscreen request tabhi kaam karegi jab user click karega
            iframe.requestFullscreen().catch((err) => {
                console.error(`Error: ${err.message}`);
            });
        }
    </script>
</body>
</html>
